<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>N4 Study</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100dvh; }
.screen { display: none; padding: 16px; }
.screen.active { display: block; }
h1 { font-size: 1.3rem; margin-bottom: 16px; }
.back-btn { background: none; border: none; color: #7ec8e3; font-size: 1rem; cursor: pointer; margin-bottom: 12px; }
.menu-btn { display: block; width: 100%; padding: 18px; margin-bottom: 12px; background: #16213e; border: 1px solid #334; border-radius: 8px; color: #eee; font-size: 1.1rem; text-align: left; cursor: pointer; }
.menu-btn:active { background: #1a3a5c; }

/* Verb cards */
.card { background: #16213e; border: 1px solid #334; border-radius: 8px; padding: 20px; margin-bottom: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.card .english { font-size: 1.1rem; color: #ccc; }
.card .japanese { margin-top: 10px; display: none; }
.card .japanese.show { display: block; }
.card .kanji { font-size: 1.6rem; color: #fff; }
.card .reading { font-size: 1rem; color: #7ec8e3; margin-top: 2px; }
.card .star-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #555; -webkit-tap-highlight-color: transparent; }
.card .star-btn.starred { color: #f5c518; }
.card { position: relative; }
.card-counter { color: #666; font-size: 0.85rem; margin-bottom: 10px; }
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.shuffle-btn, .filter-btn { background: #16213e; border: 1px solid #334; border-radius: 6px; color: #7ec8e3; padding: 8px 14px; font-size: 0.9rem; cursor: pointer; }
.filter-btn.active { background: #0f3460; border-color: #7ec8e3; }

/* Listening */
.listen-card { background: #16213e; border: 1px solid #334; border-radius: 8px; padding: 20px; margin-bottom: 12px; }
.play-btn { background: #0f3460; border: 1px solid #446; border-radius: 50%; width: 56px; height: 56px; color: #7ec8e3; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.play-btn:active { background: #1a4a7a; }
.speed-controls { text-align: center; margin-bottom: 14px; }
.speed-controls button { background: #16213e; border: 1px solid #334; border-radius: 4px; color: #7ec8e3; padding: 4px 10px; margin: 0 3px; cursor: pointer; font-size: 0.85rem; }
.speed-controls button.active { background: #0f3460; border-color: #7ec8e3; }
.reveal-area { cursor: pointer; padding: 12px; background: #111a30; border-radius: 6px; text-align: center; min-height: 50px; }
.reveal-area .hint { color: #556; font-size: 0.9rem; }
.reveal-area .sentence-jp { font-size: 1.3rem; display: none; margin-bottom: 6px; }
.reveal-area .sentence-en { font-size: 1rem; color: #aaa; display: none; }
.reveal-area.revealed .sentence-jp,
.reveal-area.revealed .sentence-en { display: block; }
.reveal-area.revealed .hint { display: none; }
.next-btn { display: block; width: 100%; padding: 14px; margin-top: 12px; background: #0f3460; border: 1px solid #446; border-radius: 8px; color: #eee; font-size: 1rem; cursor: pointer; }
.next-btn:active { background: #1a4a7a; }
.listen-counter { color: #666; font-size: 0.85rem; margin-bottom: 10px; text-align: center; }

/* Flashcards */
.fc-container { display: flex; flex-direction: column; align-items: center; }
.fc-toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; width: 100%; }
.fc-counter { color: #666; font-size: 0.85rem; margin-bottom: 12px; }
.flashcard { width: 100%; min-height: 220px; background: #16213e; border: 1px solid #334; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; cursor: pointer; -webkit-tap-highlight-color: transparent; position: relative; }
.flashcard .fc-english { font-size: 1.2rem; color: #ccc; text-align: center; }
.flashcard .fc-japanese { display: none; text-align: center; margin-top: 14px; }
.flashcard .fc-japanese.show { display: block; }
.flashcard .fc-kanji { font-size: 2rem; color: #fff; }
.flashcard .fc-reading { font-size: 1.1rem; color: #7ec8e3; margin-top: 4px; }
.flashcard .fc-star { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #555; -webkit-tap-highlight-color: transparent; }
.flashcard .fc-star.starred { color: #f5c518; }
.fc-hint { color: #556; font-size: 0.85rem; margin-top: 10px; }
.fc-nav { display: flex; gap: 10px; width: 100%; margin-top: 14px; }
.fc-nav button { flex: 1; padding: 14px; background: #0f3460; border: 1px solid #446; border-radius: 8px; color: #eee; font-size: 1rem; cursor: pointer; }
.fc-nav button:active { background: #1a4a7a; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>N4 Study</h1>
  <button class="menu-btn" onclick="showScreen('verbs')">English → Japanese Verbs</button>
  <button class="menu-btn" onclick="showScreen('flashcards')">Flashcard Mode</button>
  <button class="menu-btn" onclick="showScreen('listening')">Listening Practice</button>
</div>

<!-- VERBS -->
<div id="verbs" class="screen">
  <button class="back-btn" onclick="showScreen('home')">← Back</button>
  <h1>English → Japanese</h1>
  <div class="toolbar">
    <button class="shuffle-btn" onclick="shuffleVerbs()">Shuffle</button>
    <button class="filter-btn" id="filter-btn" onclick="toggleFilter()">Show All</button>
  </div>
  <div class="card-counter" id="verb-counter"></div>
  <div id="verb-list"></div>
</div>

<!-- FLASHCARDS -->
<div id="flashcards" class="screen">
  <button class="back-btn" onclick="showScreen('home')">← Back</button>
  <h1>Flashcard Mode</h1>
  <div class="fc-container">
    <div class="fc-toolbar">
      <button class="shuffle-btn" onclick="shuffleFC()">Shuffle</button>
      <button class="filter-btn" id="fc-filter-btn" onclick="toggleFCFilter()">Show All</button>
    </div>
    <div class="fc-counter" id="fc-counter"></div>
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <button class="fc-star" id="fc-star" onclick="toggleFCStar(event)">☆</button>
      <div class="fc-english" id="fc-english"></div>
      <div class="fc-japanese" id="fc-japanese">
        <div class="fc-kanji" id="fc-kanji"></div>
        <div class="fc-reading" id="fc-reading"></div>
      </div>
      <div class="fc-hint" id="fc-hint">Tap to reveal</div>
    </div>
    <div class="fc-nav">
      <button onclick="prevCard()">← Prev</button>
      <button onclick="nextCard()">Next →</button>
    </div>
  </div>
</div>

<!-- LISTENING -->
<div id="listening" class="screen">
  <button class="back-btn" onclick="showScreen('home')">← Back</button>
  <h1>Listening Practice</h1>
  <div class="listen-card">
    <div class="listen-counter" id="listen-counter"></div>
    <button class="play-btn" id="play-btn" onclick="playSentence()">▶</button>
    <div class="speed-controls">
      <button onclick="setSpeed(0.85)">Slow</button>
      <button class="active" onclick="setSpeed(1)">Normal</button>
      <button onclick="setSpeed(1.1)">Fast</button>
    </div>
    <div class="reveal-area" id="reveal-area" onclick="revealSentence()">
      <div class="hint">Tap to reveal</div>
      <div class="sentence-jp" id="sentence-jp"></div>
      <div class="sentence-en" id="sentence-en"></div>
    </div>
    <button class="next-btn" onclick="nextSentence()">Next →</button>
  </div>
</div>

  {jp:'四日間風が強くて、窓を開けられませんでした。', en:'The wind was strong for four days, and I could not open the windows.'},

  {jp:'三日間考えましたが、やはり行かないことにしました。', en:'I thought about it for three days, but I decided not to go after all.'},
];

// ── NAVIGATION ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'verbs') renderVerbs();
  if (id === 'flashcards') initFlashcards();
  if (id === 'listening') initListening();
}

// ── VERBS ──
let shuffledVerbs = [...verbs];
let showOnlyStarred = false;

function getStarred() {
  try { return JSON.parse(localStorage.getItem('n4_starred') || '{}'); } catch { return {}; }
}
function setStarred(obj) { localStorage.setItem('n4_starred', JSON.stringify(obj)); }
function verbKey(v) { return v[0] + '|' + v[1]; }

function toggleStar(idx, e) {
  e.stopPropagation();
  const v = shuffledVerbs[idx];
  const s = getStarred();
  const k = verbKey(v);
  if (s[k]) delete s[k]; else s[k] = 1;
  setStarred(s);
  renderVerbs();
}

function toggleFilter() {
  showOnlyStarred = !showOnlyStarred;
  document.getElementById('filter-btn').textContent = showOnlyStarred ? '★ Priority Only' : 'Show All';
  document.getElementById('filter-btn').classList.toggle('active', showOnlyStarred);
  renderVerbs();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function shuffleVerbs() {
  shuffleArray(shuffledVerbs);
  renderVerbs();
}

function renderVerbs() {
  const list = document.getElementById('verb-list');
  const starred = getStarred();
  const display = showOnlyStarred ? shuffledVerbs.filter(v => starred[verbKey(v)]) : shuffledVerbs;
  document.getElementById('verb-counter').textContent = display.length + ' verbs';
  list.innerHTML = display.map((v, i) => {
    const origIdx = shuffledVerbs.indexOf(v);
    const isStarred = starred[verbKey(v)];
    return `
    <div class="card" onclick="this.querySelector('.japanese').classList.toggle('show')">
      <button class="star-btn${isStarred ? ' starred' : ''}" onclick="toggleStar(${origIdx}, event)">${isStarred ? '★' : '☆'}</button>
      <div class="english">${v[2]}</div>
      <div class="japanese">
        <div class="kanji">${v[0]}</div>
        <div class="reading">${v[1]}</div>
      </div>
    </div>`;
  }).join('');
}

// ── LISTENING ──
let shuffledSentences = [];
let currentSentenceIdx = 0;
let speechRate = 0.85;

function initListening() {
  shuffledSentences = [...sentences];
  shuffleArray(shuffledSentences);
  currentSentenceIdx = 0;
  loadSentence();
}

function loadSentence() {
  const s = shuffledSentences[currentSentenceIdx];
  document.getElementById('sentence-jp').textContent = s.jp;
  document.getElementById('sentence-en').textContent = s.en;
  document.getElementById('reveal-area').classList.remove('revealed');
  document.getElementById('listen-counter').textContent =
    (currentSentenceIdx + 1) + ' / ' + shuffledSentences.length;
}

function playSentence() {
  const s = shuffledSentences[currentSentenceIdx];
  const u = new SpeechSynthesisUtterance(s.jp);
  u.lang = 'ja-JP';
  u.rate = speechRate;
  // Pick best available Japanese voice
  const preferred = ['Kyoko','Hattori','Google 日本語','O-Ren'];
  preferredRandomOrder = preferred.sort(() => Math.random() - 0.5);
  const voices = speechSynthesis.getVoices();
  let jpVoice = null;
  for (const name of preferredRandomOrder) {
      jpVoice = voices.find(v => v.name.includes(name));
      if (jpVoice) break;
    }
  if (!jpVoice) jpVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jpVoice) u.voice = jpVoice;
    console.log(jpVoice.name)
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function setSpeed(rate) {
  speechRate = rate;
  document.querySelectorAll('.speed-controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function revealSentence() {
  document.getElementById('reveal-area').classList.add('revealed');
}

function nextSentence() {
  currentSentenceIdx = (currentSentenceIdx + 1) % shuffledSentences.length;
  loadSentence();
}

// ── FLASHCARDS ──
let fcDeck = [];
let fcIdx = 0;
let fcStarredOnly = false;

function initFlashcards() {
  fcDeck = [...verbs];
  shuffleArray(fcDeck);
  applyFCFilter();
}

function applyFCFilter() {
  if (fcStarredOnly) {
    const starred = getStarred();
    fcDeck = fcDeck.filter(v => starred[verbKey(v)]);
  }
  fcIdx = 0;
  if (fcDeck.length > 0) loadCard();
  else {
    document.getElementById('fc-english').textContent = 'No starred verbs yet';
    document.getElementById('fc-japanese').classList.remove('show');
    document.getElementById('fc-hint').style.display = 'none';
    document.getElementById('fc-counter').textContent = '0 / 0';
  }
}

function loadCard() {
  const v = fcDeck[fcIdx];
  document.getElementById('fc-english').textContent = v[2];
  document.getElementById('fc-kanji').textContent = v[0];
  document.getElementById('fc-reading').textContent = v[1];
  document.getElementById('fc-japanese').classList.remove('show');
  document.getElementById('fc-hint').style.display = '';
  document.getElementById('fc-hint').textContent = 'Tap to reveal';
  document.getElementById('fc-counter').textContent = (fcIdx + 1) + ' / ' + fcDeck.length;
  const starred = getStarred();
  const starBtn = document.getElementById('fc-star');
  const isStarred = starred[verbKey(v)];
  starBtn.textContent = isStarred ? '★' : '☆';
  starBtn.classList.toggle('starred', !!isStarred);
}

function flipCard() {
  if (fcDeck.length === 0) return;
  document.getElementById('fc-japanese').classList.add('show');
  document.getElementById('fc-hint').style.display = 'none';
}

function nextCard() {
  if (fcDeck.length === 0) return;
  fcIdx = (fcIdx + 1) % fcDeck.length;
  loadCard();
}

function prevCard() {
  if (fcDeck.length === 0) return;
  fcIdx = (fcIdx - 1 + fcDeck.length) % fcDeck.length;
  loadCard();
}

function shuffleFC() {
  shuffleArray(fcDeck);
  fcIdx = 0;
  if (fcDeck.length > 0) loadCard();
}

function toggleFCStar(e) {
  e.stopPropagation();
  if (fcDeck.length === 0) return;
  const v = fcDeck[fcIdx];
  const s = getStarred();
  const k = verbKey(v);
  if (s[k]) delete s[k]; else s[k] = 1;
  setStarred(s);
  const starBtn = document.getElementById('fc-star');
  starBtn.textContent = s[k] ? '★' : '☆';
  starBtn.classList.toggle('starred', !!s[k]);
}

function toggleFCFilter() {
  fcStarredOnly = !fcStarredOnly;
  document.getElementById('fc-filter-btn').textContent = fcStarredOnly ? '★ Priority Only' : 'Show All';
  document.getElementById('fc-filter-btn').classList.toggle('active', fcStarredOnly);
  fcDeck = [...verbs];
  shuffleArray(fcDeck);
  applyFCFilter();
}

// Pre-load voices (needed on some browsers)
speechSynthesis.onvoiceschanged = () => {};
</script>
